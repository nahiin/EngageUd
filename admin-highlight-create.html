<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Highlight | EngageU Hub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Core CSS -->
    <link href="css/style.css?v=2" rel="stylesheet">
</head>

<body>

    <div id="admin-wrapper">
        <!-- Sidebar Nav -->
        <nav id="sidebar">
            <div class="sidebar-header d-flex align-items-center justify-content-between">
                <div class="auth-logo fs-4 m-0">Engage<span>U</span></div>
                <button class="btn btn-sm d-lg-none" id="sidebarCloseBtn">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <ul class="components">
                <li>
                    <a href="admin-competitions.html"><i class="bi bi-trophy"></i> Competitions</a>
                </li>
                <li>
                    <a href="admin-applications-list.html"><i class="bi bi-file-earmark-text"></i> Applications</a>
                </li>
                <li>
                    <a href="admin-users.html"><i class="bi bi-people"></i> Users</a>
                </li>
                <li class="active">
                    <a href="admin-highlights.html"><i class="bi bi-star"></i> Highlights</a>
                </li>
                <li class="mt-4">
                    <a href="login.html" class="text-danger"><i class="bi bi-box-arrow-left"></i> Logout</a>

                </li>
            </ul>

        </nav>

        <!-- Main Page Content Wrapper -->
        <div id="page-content-wrapper">
            <!-- Top Navbar -->
            <nav class="top-navbar">
                <div class="d-flex align-items-center">
                    <button class="btn btn-light d-lg-none me-3" id="sidebarToggleBtn">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <h4 class="m-0 fw-bold">Highlights</h4>
                </div>

                <div class="user-profile d-flex align-items-center">
                    <div class="text-end me-3 d-none d-md-block">
                        <p class="m-0 fw-semibold fs-6 text-dark" id="userEmail">admin@pmu.edu.sa</p>
                        <small class="text-muted" id="userRole">Manager</small>
                    </div>
                    <div class="d-flex align-items-center justify-content-center text-white fw-bold rounded-circle shadow-sm avatar-circle-lg bg-avatar-primary"
                        id="userAvatar">AD</div>
                </div>
            </nav>

            <!-- Main Content Area -->
            <div class="container-fluid p-4 p-md-5">
                <div class="mb-4">
                    <a href="admin-highlights.html" class="text-decoration-none btn-back text-muted fw-semibold">
                        <i class="bi bi-arrow-left me-1"></i> Back to Highlights
                    </a>
                </div>

                <div class="row justify-content-center">
                    <div class="col-12">
                        <div class="dashboard-card p-4 p-md-5 animate-fade-up">

                            <h5 class="fw-bold mb-4">Create Spotlight Highlight</h5>

                            <form action="#" method="POST" enctype="multipart/form-data">
                                <!-- Modern Drag & Drop Zone -->
                                <div class="mb-5">
                                    <label class="form-label fw-semibold text-dark mb-3">Cover / Banner Image</label>
                                    <div class="upload-dropzone border border-2 rounded-4 p-5 text-center bg-light position-relative"
                                        style="border-style: dashed !important; cursor: pointer; transition: all 0.2s ease;">
                                        <input type="file" name="image" accept=".jpg,.jpeg,.png"
                                            class="position-absolute w-100 h-100 top-0 start-0 opacity-0"
                                            style="cursor: pointer; z-index: 10;">

                                        <div class="icon-wrapper-secondary d-inline-flex align-items-center justify-content-center p-3 rounded-circle bg-white shadow-sm mb-3"
                                            style="width: 60px; height: 60px;">
                                            <i class="bi bi-cloud-arrow-up fs-3 text-secondary"></i>
                                        </div>
                                        <h5 class="fw-bold mb-2 text-dark">Click to upload or drag and drop</h5>
                                        <p class="text-muted small mb-0">PNG and JPG only (Recommended size:
                                            1200x600px)</p>

                                    </div>
                                </div>

                                <div class="row mb-4">
                                    <div class="col-md-8">
                                        <label class="form-label fw-semibold text-muted small">Highlight Title</label>
                                        <input type="text" class="form-control form-control-lg fs-6" name="title"
                                            placeholder="e.g. Apply for RWADTHON 2026!">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold text-muted small">Visibility Status</label>
                                        <select class="form-select form-select-lg fs-6 border" name="status">
                                            <option value="Visible">Visible (Published)</option>
                                            <option value="Hidden">Hidden (Draft)</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="row mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold text-muted small">Category Type</label>
                                        <div class="input-group input-group-lg">
                                            <span class="input-group-text bg-light comp-type-icon"><i
                                                    class="bi bi-trophy text-muted"></i></span>
                                            <select class="form-select border-start-0 fs-6" name="competition_type">
                                                <option selected disabled>Select Category...</option>
                                                <option value="Entrepreneurship">Entrepreneurship</option>
                                                <option value="Technology">Technology</option>
                                                <option value="Education">Education</option>
                                                <option value="Sustainability">Sustainability</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold text-muted small">Slug</label>
                                        <div class="input-group input-group-lg">
                                            <span class="input-group-text bg-light"><i
                                                    class="bi bi-link text-muted"></i></span>
                                            <input type="text" class="form-control border-start-0 fs-6" name="slug"
                                                placeholder="e.g. apply-rwadthon-2026">
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-semibold text-muted small">Short Description</label>
                                    <input type="text" class="form-control form-control-lg fs-6"
                                        name="short_description" placeholder="Brief subtitle text...">
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-semibold text-muted small">Summary</label>
                                    <div class="rich-text-wrapper border rounded bg-white">
                                        <div class="rich-text-toolbar border-bottom bg-light p-2 d-flex gap-2">
                                            <button type="button" class="btn btn-sm btn-light"><i
                                                    class="bi bi-type-bold"></i></button>
                                            <button type="button" class="btn btn-sm btn-light"><i
                                                    class="bi bi-type-italic"></i></button>
                                            <button type="button" class="btn btn-sm btn-light"><i
                                                    class="bi bi-list-ul"></i></button>
                                            <button type="button" class="btn btn-sm btn-light"><i
                                                    class="bi bi-link-45deg"></i></button>
                                        </div>
                                        <div class="rich-text-editor form-control border-0 shadow-none"
                                            contenteditable="true"
                                            data-placeholder="Detailed summary text for the highlight..."
                                            style="min-height: 200px; padding: 1.25rem;"></div>
                                        <textarea name="summary" class="d-none"></textarea>
                                    </div>
                                </div>

                                <div class="form-actions mt-5 pt-4 border-top">
                                    <a href="admin-highlights.html" class="btn btn-cancel">Cancel</a>
                                    <button type="submit" class="btn btn-primary-custom px-5">Publish Highlight</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <style>
        /* Hover effect for drag and drop */
        .upload-dropzone:hover {
            background-color: #fff !important;
            border-color: var(--secondary-color) !important;
        }

        .upload-dropzone:hover .icon-wrapper-secondary {
            transform: scale(1.1);
            transition: transform 0.2s;
        }
    </style>
    <script>
        document.querySelector('form[method="POST"]').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Publishing...';
            btn.disabled = true;
            setTimeout(() => {
                window.location.href = 'admin-highlights.html';
            }, 1000);
        });
    </script>
</body>


</html>
