<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | EngageU Hub</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Core CSS -->
    <link href="css/style.css?v=2" rel="stylesheet">
</head>
<body>

    <div class="auth-wrapper container-fluid p-0">
        <div class="auth-form-container animate-fade-up shadow-lg border">
            <div class="text-center mb-5">
                <div class="auth-logo mb-3">Engage<span>U</span></div>
                <h2 class="fw-bold fs-3 text-dark">Welcome Back</h2>
                <p class="text-muted">Please enter your admin credentials to login.</p>
            </div>

            <form action="admin-competitions.html" method="GET">
                <!-- Email Input -->
                <div class="form-floating mb-4">
                    <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" value="admin@pmu.edu.sa" required>
                    <label for="emailInput">Email address</label>
                </div>

                <!-- Password Input -->
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="passwordInput" placeholder="Password" value="password" required>
                    <label for="passwordInput">Password</label>
                </div>

                <!-- Extra Options -->
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                        <label class="form-check-label text-muted" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="#" class="text-decoration-none fw-medium text-primary-custom">Forgot Password?</a>
                </div>

                <!-- Submit -->
                <button class="btn btn-primary-custom w-100 mb-4 py-3 fw-bold" type="submit">Sign In to Dashboard</button>
            </form>
            
            <div class="text-center mt-4 pt-2 border-top">
                <p class="text-muted small mb-0 mt-3">&copy; 2026 PMU NextGen EngageU Hub. All rights reserved.</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle (with Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
