    <div class="hp-drawer-header">
        <a href="index.html" class="hp-logo">
            <img src="assets/images/nextgenengageu-logo.png" alt="NextGen EngageU Hub" class="hp-logo-img">
            <div class="hp-logo-brand">
                <span class="hp-logo-brand-sub">NextGen</span>
                <div class="hp-logo-brand-main">Engage<span>U</span> Hub</div>
            </div>
        </a>
        <button class="hp-drawer-close" id="hp-drawer-close" aria-label="Close menu">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    <nav class="hp-drawer-nav">
        <a href="index.html#hp-home"         class="hp-drawer-link" data-nav-key="home">Home</a>
        <a href="index.html#hp-about"        class="hp-drawer-link" data-nav-key="about">About</a>

    </nav>

            <a href="signup.html" class="hp-drawer-join-btn">Join the Hub <i class="bi bi-arrow-right"></i></a>
        </div>
        <div id="hp-mobile-auth-in" style="display:none;">
            <a href="my-submissions.html" class="hp-drawer-link"><i class="bi bi-file-earmark-text me-2"></i> My Submissions</a>
            <button class="hp-drawer-logout-btn" id="hp-mobile-logout"><i class="bi bi-box-arrow-right me-2"></i> Logout</button>
        </div>
    </div>

</div>

<script>
(function () {
    var cfg = window._navCfg || {};

    var nav       = document.getElementById('hp-nav');
    var overlay   = document.getElementById('hp-drawer-overlay');
    var drawer    = document.getElementById('hp-side-drawer');
    var toggleBtn = document.getElementById('hp-mobile-toggle');
    var closeBtn  = document.getElementById('hp-drawer-close');

    if (!nav) return;

    /* ---- Scroll behaviour ---- */
    if (!cfg.transparent) nav.classList.add('scrolled');
    window.addEventListener('scroll', function () {
        nav.classList.toggle('scrolled', window.scrollY > 30);
    }, { passive: true });

    /* ---- Side drawer ---- */
    function openDrawer() {
        drawer.classList.add('open');
        overlay.classList.add('open');
        drawer.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
        drawer.classList.remove('open');
        overlay.classList.remove('open');
        drawer.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
    }

    if (toggleBtn) toggleBtn.addEventListener('click', openDrawer);
    if (closeBtn)  closeBtn.addEventListener('click', closeDrawer);
    if (overlay)   overlay.addEventListener('click', closeDrawer);
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeDrawer(); });

    drawer.querySelectorAll('a').forEach(function (a) { a.addEventListener('click', closeDrawer); });
    drawer.querySelectorAll('button').forEach(function (b) {
        if (b !== closeBtn) b.addEventListener('click', closeDrawer);
    });

    /* ---- Active nav link ---- */
    if (cfg.activePage) {
        document.querySelectorAll('[data-nav-key="' + cfg.activePage + '"]').forEach(function (el) {
            el.classList.add('active');
            el.style.color = 'var(--secondary-color)';
            el.style.fontWeight = '600';
        });
    }

    /* ---- Auth state ---- */
    var KEY  = 'engageu_user';
    var DEMO = { name: 'John Doe', email: 'john@pmu.edu.sa', initials: '<i class="bi bi-person-fill"></i>' };

    function getUser()   { return JSON.parse(localStorage.getItem(KEY) || 'null'); }
    function saveUser(u) { localStorage.setItem(KEY, JSON.stringify(u)); }
    function clearUser() { localStorage.removeItem(KEY); }

    function applyState(user) {
        var out  = document.getElementById('hp-auth-out');
        var inn  = document.getElementById('hp-auth-in');
        var mOut = document.getElementById('hp-mobile-auth-out');
        var mInn = document.getElementById('hp-mobile-auth-in');
        if (!out) return;
        if (user) {
            out.style.display = 'none'; inn.style.display = '';
            if (mOut) mOut.style.display = 'none';
            if (mInn) mInn.style.display = '';
            var av = document.getElementById('hp-user-avatar');
            var nm = document.getElementById('hp-user-name');
            var dn = document.getElementById('hp-dd-name');
            var de = document.getElementById('hp-dd-email');
            if (av) av.innerHTML = user.initials;
            if (nm) nm.textContent = user.name.split(' ')[0];
            if (dn) dn.textContent = user.name;
            if (de) de.textContent = user.email;
        } else {
            out.style.display = ''; inn.style.display = 'none';
            if (mOut) mOut.style.display = '';
            if (mInn) mInn.style.display = 'none';
        }
    }

    applyState(getUser());

    var loginBtn = document.getElementById('hp-login-btn');
    if (loginBtn) loginBtn.addEventListener('click', function (e) { e.preventDefault(); saveUser(DEMO); applyState(DEMO); });

    var mLoginBtn = document.getElementById('hp-mobile-login-btn');
    if (mLoginBtn) mLoginBtn.addEventListener('click', function (e) { e.preventDefault(); saveUser(DEMO); applyState(DEMO); });

    var logoutBtn = document.getElementById('hp-logout-btn');
    if (logoutBtn) logoutBtn.addEventListener('click', function () { clearUser(); applyState(null); });

    var mLogout = document.getElementById('hp-mobile-logout');
    if (mLogout) mLogout.addEventListener('click', function () { clearUser(); applyState(null); });

    var trigger  = document.getElementById('hp-user-trigger');
    var dropdown = document.getElementById('hp-user-dropdown');
    if (trigger && dropdown) {
        trigger.addEventListener('click', function (e) {
            e.stopPropagation();
            dropdown.classList.toggle('open');
            var ch = trigger.querySelector('.hp-user-chevron');
            if (ch) ch.classList.toggle('rotated');
        });
        document.addEventListener('click', function () {
            dropdown.classList.remove('open');
            var ch = trigger.querySelector('.hp-user-chevron');
            if (ch) ch.classList.remove('rotated');
        });
    }
})();
</script>
